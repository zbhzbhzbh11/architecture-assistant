version: "3.9"

services:
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      REQUIREMENTS_AGENT_URL: http://requirements-agent:8001
      MATCHING_AGENT_URL: http://matching-agent:8002
      EVALUATION_AGENT_URL: http://evaluation-agent:8003
      REFACTORING_AGENT_URL: http://refactoring-agent:8005
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      CACHE_BACKEND: ${CACHE_BACKEND:-memory}
      LLM_MODEL: ${LLM_MODEL:-}
    depends_on:
      - requirements-agent
      - matching-agent
      - evaluation-agent
      - refactoring-agent

  requirements-agent:
    build:
      context: ./services
      dockerfile: requirements-agent/Dockerfile
    container_name: requirements-agent
    ports:
      - "8001:8001"
    environment:
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}

  matching-agent:
    build: ./services/matching-agent
    container_name: matching-agent
    ports:
      - "8002:8002"
    depends_on:
      - knowledge-base
    environment:
      KNOWLEDGE_BASE_URL: http://knowledge-base:8004

  evaluation-agent:
    build:
      context: ./services
      dockerfile: evaluation-agent/Dockerfile
    container_name: evaluation-agent
    ports:
      - "8003:8003"
    environment:
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}

  knowledge-base:
    build: ./services/knowledge-base
    container_name: knowledge-base
    ports:
      - "8004:8004"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jneo4j}
      KNOWLEDGE_BACKEND: ${KNOWLEDGE_BACKEND:-auto}
    depends_on:
      - neo4j

  refactoring-agent:
    build:
      context: ./services
      dockerfile: refactoring-agent/Dockerfile
    container_name: refactoring-agent
    ports:
      - "8005:8005"
    environment:
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}

  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jneo4j}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_AUTH%%/*} -p $${NEO4J_AUTH#*/} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: architecture-frontend
    ports:
      - "3000:80"
    environment:
      GATEWAY_URL: http://localhost:8000
    depends_on:
      - api-gateway

volumes:
  neo4j_data:
  neo4j_logs:
